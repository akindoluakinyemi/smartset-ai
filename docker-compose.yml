version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: smartset_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartset

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .

    container_name: smartset_backend

    depends_on:
      - postgres

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/smartset
      MODEL_PATH: ml/saved_models/forecast_model.pkl

    ports:
      - "8000:8000"
    
      
  dashboard:
    build: .
    container_name: smartset_dashboard

    depends_on:
      - postgres
      - backend

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/smartset
      MODEL_PATH: ml/saved_models/forecast_model.pkl

    ports:
      - "8501:8501"

    command: streamlit run dashboard/app.py --server.address=0.0.0.0

volumes:
  postgres_data:
